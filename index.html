<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            50: '#f8f9fa',
                            100: '#f1f3f4',
                            200: '#e8eaed',
                            800: '#202124',
                            900: '#171717',
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        /* Mobile optimization & Scrollbars */
        :root { scroll-behavior: smooth; }
        body { -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
        .prose pre { background-color: #1e1e1e !important; color: #d4d4d4 !important; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
        .prose code { padding: 0.2em 0.4em; background-color: rgba(156, 163, 175, 0.2); border-radius: 0.25rem; font-size: 85%; font-weight: normal !important; }
        .prose pre code { background-color: transparent; padding: 0; color: inherit; }
        /* Safe typing cursor */
        .typing-cursor::after { content: '▋'; animation: blink 1s step-start infinite; color: #3b82f6; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }
        /* Prevent body scroll when sidebar open on mobile */
        body.sidebar-open { overflow: hidden; }
    </style>
</head>
<body class="bg-white dark:bg-gemini-900 text-gray-800 dark:text-gray-200 transition-colors duration-200 relative">

    <div id="loading" class="fixed inset-0 z-[9999] bg-white dark:bg-gemini-900 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-semibold text-gray-700 dark:text-gray-300">Loading Workspace...</h2>
    </div>

    <div id="app-container" class="flex min-h-[100dvh] w-full overflow-hidden">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity" onclick="UI.toggleSidebar()"></div>

        <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-50 w-72 bg-gemini-50 dark:bg-gemini-800 border-r border-gray-200 dark:border-gray-700 flex flex-col transition-transform duration-300 -translate-x-full md:translate-x-0">
            <div class="p-4 flex items-center justify-between">
                <button onclick="App.createNewChat()" class="flex-1 flex items-center gap-2 bg-white dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 rounded-full py-2 px-4 shadow-sm transition-colors">
                    <span class="material-symbols-outlined text-blue-500">add</span>
                    <span class="font-medium">New Chat</span>
                </button>
                <button onclick="UI.toggleSidebar()" class="md:hidden ml-2 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <div class="px-4 pb-2 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Recent</div>
            <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex flex-col gap-2">
                <button onclick="UI.openModal('system-prompt-modal')" class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 text-sm transition-colors text-left">
                    <span class="material-symbols-outlined text-gray-500">tune</span>
                    <span>System Prompt</span>
                </button>
                <button onclick="UI.openModal('settings-modal')" class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 text-sm transition-colors text-left">
                    <span class="material-symbols-outlined text-gray-500">settings</span>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-gemini-900 relative">
            <header class="h-14 flex items-center justify-between px-4 border-b border-gray-100 dark:border-gray-800 bg-white/80 dark:bg-gemini-900/80 backdrop-blur z-10 sticky top-0">
                <div class="flex items-center gap-3">
                    <button onclick="UI.toggleSidebar()" class="md:hidden p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <h1 id="current-chat-title" class="text-lg font-medium truncate max-w-[200px] md:max-w-md">Universal AI</h1>
                </div>
                <button onclick="UI.toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300">
                    <span id="dark-mode-icon" class="material-symbols-outlined">dark_mode</span>
                </button>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth flex flex-col gap-6">
                </div>

            <div class="p-4 bg-white dark:bg-gemini-900 border-t border-gray-100 dark:border-gray-800">
                <div class="max-w-4xl mx-auto relative flex items-end gap-2 bg-gemini-100 dark:bg-gray-800 rounded-3xl p-2 border border-transparent focus-within:border-gray-300 dark:focus-within:border-gray-600 transition-colors shadow-sm">
                    <textarea 
                        id="message-input" 
                        rows="1" 
                        class="w-full max-h-32 bg-transparent border-none focus:ring-0 resize-none py-3 px-4 text-gray-800 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400"
                        placeholder="Message AI..."
                        oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                        onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); App.sendMessage(); }"
                    ></textarea>
                    <button id="send-btn" onclick="App.sendMessage()" class="p-3 mb-1 mr-1 rounded-full bg-blue-500 hover:bg-blue-600 text-white disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex-shrink-0">
                        <span class="material-symbols-outlined text-xl">send</span>
                    </button>
                </div>
                <div class="text-center mt-2 text-xs text-gray-400">AI can make mistakes. Verify important information.</div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-md p-6 transform scale-95 transition-transform">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold">Settings</h3>
                <button onclick="UI.closeModal('settings-modal')" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model Name</label>
                    <input type="text" id="model-input" class="w-full p-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="deepseek/deepseek-r1:free">
                </div>
                <button onclick="App.saveSettings()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 rounded-lg transition-colors mt-4">Save Configuration</button>
            </div>
        </div>
    </div>

    <div id="system-prompt-modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-lg p-6 transform scale-95 transition-transform">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold">Global System Prompt</h3>
                <button onclick="UI.closeModal('system-prompt-modal')" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="space-y-4">
                <textarea id="system-prompt-input" rows="5" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none resize-y" placeholder="You are a helpful AI assistant..."></textarea>
                <button onclick="App.saveSystemPrompt()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 rounded-lg transition-colors">Save Prompt</button>
            </div>
        </div>
    </div>

    <script>
        // Setup Marked.js options securely
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Generate UUID
        const generateId = () => Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);

        // Core State
        const State = {
            apiKey: '',
            model: 'deepseek/deepseek-r1:free',
            systemPrompt: 'You are a helpful, smart, kind, and efficient AI assistant.',
            chats: [],
            currentChatId: null,
            isDarkMode: false,
            isGenerating: false,
            abortController: null,

            init() {
                try {
                    this.apiKey = localStorage.getItem('ai_apiKey') || '';
                    this.model = localStorage.getItem('ai_model') || 'deepseek/deepseek-r1:free';
                    this.systemPrompt = localStorage.getItem('ai_systemPrompt') || this.systemPrompt;
                    this.isDarkMode = localStorage.getItem('ai_theme') === 'dark';
                    
                    const savedChats = localStorage.getItem('ai_chats');
                    if (savedChats) {
                        this.chats = JSON.parse(savedChats);
                    }
                    
                    if (this.chats.length === 0) {
                        App.createNewChat(false); // Don't render yet
                    } else {
                        this.currentChatId = localStorage.getItem('ai_currentChatId') || this.chats[0].id;
                        // Validate currentChatId exists
                        if (!this.chats.find(c => c.id === this.currentChatId)) {
                            this.currentChatId = this.chats[0].id;
                        }
                    }
                } catch (e) {
                    console.error("Storage initialization error:", e);
                    this.chats = [];
                    App.createNewChat(false);
                }
            },

            save() {
                localStorage.setItem('ai_apiKey', this.apiKey);
                localStorage.setItem('ai_model', this.model);
                localStorage.setItem('ai_systemPrompt', this.systemPrompt);
                localStorage.setItem('ai_theme', this.isDarkMode ? 'dark' : 'light');
                localStorage.setItem('ai_chats', JSON.stringify(this.chats));
                localStorage.setItem('ai_currentChatId', this.currentChatId);
            },

            getCurrentChat() {
                return this.chats.find(c => c.id === this.currentChatId);
            }
        };

        // UI Manipulation
        const UI = {
            els: {
                html: document.documentElement,
                body: document.body,
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebar-overlay'),
                chatContainer: document.getElementById('chat-container'),
                chatList: document.getElementById('chat-list'),
                msgInput: document.getElementById('message-input'),
                sendBtn: document.getElementById('send-btn'),
                chatTitle: document.getElementById('current-chat-title'),
                darkModeIcon: document.getElementById('dark-mode-icon'),
                loading: document.getElementById('loading')
            },

            applyTheme() {
                if (State.isDarkMode) {
                    this.els.html.classList.add('dark');
                    this.els.darkModeIcon.textContent = 'light_mode';
                } else {
                    this.els.html.classList.remove('dark');
                    this.els.darkModeIcon.textContent = 'dark_mode';
                }
            },

            toggleDarkMode() {
                State.isDarkMode = !State.isDarkMode;
                State.save();
                this.applyTheme();
            },

            toggleSidebar() {
                const isOpen = !this.els.sidebar.classList.contains('-translate-x-full');
                if (isOpen) {
                    this.els.sidebar.classList.add('-translate-x-full');
                    this.els.sidebarOverlay.classList.add('hidden');
                    this.els.body.classList.remove('sidebar-open');
                } else {
                    this.els.sidebar.classList.remove('-translate-x-full');
                    this.els.sidebarOverlay.classList.remove('hidden');
                    this.els.body.classList.add('sidebar-open');
                }
            },

            openModal(id) {
                const modal = document.getElementById(id);
                if (!modal) return;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => modal.firstElementChild.classList.remove('scale-95'), 10);
                
                // Populate data
                if(id === 'settings-modal') {
                    document.getElementById('api-key-input').value = State.apiKey;
                    document.getElementById('model-input').value = State.model;
                } else if(id === 'system-prompt-modal') {
                    document.getElementById('system-prompt-input').value = State.systemPrompt;
                }
            },

            closeModal(id) {
                const modal = document.getElementById(id);
                if (!modal) return;
                modal.firstElementChild.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 150);
            },

            scrollToBottom() {
                this.els.chatContainer.scrollTop = this.els.chatContainer.scrollHeight;
            },

            renderChatList() {
                this.els.chatList.innerHTML = '';
                State.chats.forEach(chat => {
                    const isActive = chat.id === State.currentChatId;
                    const div = document.createElement('div');
                    div.className = `group flex items-center justify-between p-2 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300'}`;
                    
                    div.innerHTML = `
                        <div class="flex-1 truncate text-sm" onclick="App.selectChat('${chat.id}')">${chat.title || 'New Chat'}</div>
                        <div class="hidden group-hover:flex items-center gap-1 ml-2">
                            <button onclick="App.renameChat('${chat.id}')" class="p-1 hover:text-blue-500 rounded"><span class="material-symbols-outlined text-[16px]">edit</span></button>
                            <button onclick="App.deleteChat('${chat.id}')" class="p-1 hover:text-red-500 rounded"><span class="material-symbols-outlined text-[16px]">delete</span></button>
                        </div>
                    `;
                    this.els.chatList.appendChild(div);
                });
            },

            renderMessages() {
                this.els.chatContainer.innerHTML = '';
                const chat = State.getCurrentChat();
                
                if (!chat) return;
                this.els.chatTitle.textContent = chat.title;

                if (chat.messages.length === 0) {
                    this.els.chatContainer.innerHTML = `
                        <div class="flex-1 flex flex-col items-center justify-center text-center opacity-70 mt-20">
                            <div class="w-16 h-16 bg-gradient-to-tr from-blue-400 to-purple-500 rounded-full flex items-center justify-center mb-4 shadow-lg">
                                <span class="material-symbols-outlined text-white text-3xl">smart_toy</span>
                            </div>
                            <h2 class="text-2xl font-semibold mb-2">How can I help you today?</h2>
                            <p class="text-sm">Model: <span class="font-mono text-xs bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded">${State.model}</span></p>
                        </div>
                    `;
                    return;
                }

                chat.messages.forEach(msg => {
                    this.appendMessage(msg.role, msg.content, false);
                });
                this.scrollToBottom();
            },

            appendMessage(role, content, isStreaming = false) {
                const wrapper = document.createElement('div');
                wrapper.className = `flex gap-4 max-w-4xl mx-auto w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
                
                const bubble = document.createElement('div');
                
                if (role === 'user') {
                    bubble.className = "bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-200 px-5 py-3 rounded-2xl rounded-tr-sm max-w-[85%] whitespace-pre-wrap";
                    bubble.textContent = content;
                    wrapper.appendChild(bubble);
                } else {
                    wrapper.innerHTML = `
                        <div class="flex-shrink-0 w-8 h-8 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-full flex items-center justify-center mt-1">
                            <span class="material-symbols-outlined text-white text-[18px]">smart_toy</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="prose dark:prose-invert max-w-none ai-content text-gray-800 dark:text-gray-200 ${isStreaming ? 'typing-cursor' : ''}">
                                ${marked.parse(content || '')}
                            </div>
                        </div>
                    `;
                }

                this.els.chatContainer.appendChild(wrapper);
                this.scrollToBottom();
                return wrapper;
            },

            updateLastAIMessage(content, isComplete = false) {
                const msgs = this.els.chatContainer.querySelectorAll('.ai-content');
                if (msgs.length === 0) return;
                const lastMsg = msgs[msgs.length - 1];
                
                if (isComplete) {
                    lastMsg.classList.remove('typing-cursor');
                }
                
                // Only parse markdown on complete, or use a streaming friendly approach. 
                // For performance, we continuously parse. Marked handles incomplete well.
                lastMsg.innerHTML = marked.parse(content);
                this.scrollToBottom();
            },

            setLoading(isLoading) {
                State.isGenerating = isLoading;
                if (isLoading) {
                    this.els.sendBtn.innerHTML = '<span class="material-symbols-outlined text-xl">stop</span>';
                    this.els.sendBtn.classList.replace('bg-blue-500', 'bg-red-500');
                    this.els.sendBtn.classList.replace('hover:bg-blue-600', 'hover:bg-red-600');
                } else {
                    this.els.sendBtn.innerHTML = '<span class="material-symbols-outlined text-xl">send</span>';
                    this.els.sendBtn.classList.replace('bg-red-500', 'bg-blue-500');
                    this.els.sendBtn.classList.replace('hover:bg-red-600', 'hover:bg-blue-600');
                    this.els.msgInput.focus();
                }
            }
        };

        // Application Logic
        const App = {
            createNewChat(render = true) {
                const newChat = {
                    id: generateId(),
                    title: 'New Chat',
                    messages: []
                };
                State.chats.unshift(newChat);
                State.currentChatId = newChat.id;
                State.save();
                
                if (render) {
                    UI.renderChatList();
                    UI.renderMessages();
                    if (window.innerWidth < 768) UI.toggleSidebar();
                }
            },

            selectChat(id) {
                State.currentChatId = id;
                State.save();
                UI.renderChatList();
                UI.renderMessages();
                if (window.innerWidth < 768) UI.toggleSidebar();
            },

            deleteChat(id) {
                if(!confirm('Are you sure you want to delete this chat?')) return;
                State.chats = State.chats.filter(c => c.id !== id);
                if (State.chats.length === 0) {
                    this.createNewChat(false);
                } else if (State.currentChatId === id) {
                    State.currentChatId = State.chats[0].id;
                }
                State.save();
                UI.renderChatList();
                UI.renderMessages();
            },

            renameChat(id) {
                const chat = State.chats.find(c => c.id === id);
                if(!chat) return;
                const newTitle = prompt('Enter new title:', chat.title);
                if(newTitle && newTitle.trim()) {
                    chat.title = newTitle.trim();
                    State.save();
                    UI.renderChatList();
                    if(State.currentChatId === id) UI.els.chatTitle.textContent = chat.title;
                }
            },

            saveSettings() {
                State.apiKey = document.getElementById('api-key-input').value.trim();
                State.model = document.getElementById('model-input').value.trim() || 'deepseek/deepseek-r1:free';
                State.save();
                UI.closeModal('settings-modal');
            },

            saveSystemPrompt() {
                State.systemPrompt = document.getElementById('system-prompt-input').value.trim();
                State.save();
                UI.closeModal('system-prompt-modal');
            },

            async sendMessage() {
                if (State.isGenerating) {
                    if (State.abortController) State.abortController.abort();
                    UI.setLoading(false);
                    return;
                }

                const content = UI.els.msgInput.value.trim();
                if (!content) return;

                if (!State.apiKey) {
                    alert("Please set your OpenRouter API Key in Settings first.");
                    UI.openModal('settings-modal');
                    return;
                }

                const chat = State.getCurrentChat();
                if (!chat) return;

                // Auto-generate title if first message
                if (chat.messages.length === 0) {
                    chat.title = content.length > 30 ? content.substring(0, 30) + '...' : content;
                    UI.renderChatList();
                }

                // Add User Message
                chat.messages.push({ role: 'user', content });
                UI.els.msgInput.value = '';
                UI.els.msgInput.style.height = '';
                State.save();
                
                // Clear welcome screen if it's the first message
                if(chat.messages.length === 1) UI.els.chatContainer.innerHTML = '';
                
                UI.appendMessage('user', content);
                UI.setLoading(true);

                // Add empty AI message wrapper for streaming
                UI.appendMessage('assistant', '', true);
                
                // Prepare API Payload
                const apiMessages = [
                    { role: 'system', content: State.systemPrompt },
                    ...chat.messages.map(m => ({ role: m.role, content: m.content }))
                ];

                State.abortController = new AbortController();
                let fullAiResponse = "";

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${State.apiKey}`,
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'Universal AI Chat'
                        },
                        body: JSON.stringify({
                            model: State.model,
                            messages: apiMessages,
                            stream: true
                        }),
                        signal: State.abortController.signal
                    });

                    if (!response.ok) {
                        const err = await response.json().catch(()=>({}));
                        throw new Error(err.error?.message || `HTTP ${response.status}: ${response.statusText}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let buffer = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split("\n");
                        buffer = lines.pop(); // Keep the last incomplete line in the buffer

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed || trimmed === "data: [DONE]") continue;
                            if (trimmed.startsWith("data: ")) {
                                try {
                                    const parsed = JSON.parse(trimmed.slice(6));
                                    const delta = parsed.choices?.[0]?.delta?.content;
                                    if (delta) {
                                        fullAiResponse += delta;
                                        UI.updateLastAIMessage(fullAiResponse, false);
                                    }
                                } catch (e) {
                                    console.warn("SSE Parse error:", e, "Line:", trimmed);
                                }
                            }
                        }
                    }

                } catch (error) {
                    if (error.name === 'AbortError') {
                        fullAiResponse += "\n\n*(Generation stopped by user)*";
                    } else {
                        console.error("API Error:", error);
                        fullAiResponse = `**Error:** ${error.message}\n\nPlease check your API key, network connection, and model selection.`;
                    }
                } finally {
                    UI.updateLastAIMessage(fullAiResponse, true);
                    chat.messages.push({ role: 'assistant', content: fullAiResponse });
                    State.save();
                    UI.setLoading(false);
                    State.abortController = null;
                }
            }
        };

        // Bootstrap the application strictly after DOM parses
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // Initialize state
                State.init();
                
                // Initialize UI
                UI.applyTheme();
                UI.renderChatList();
                UI.renderMessages();

                // Remove loading screen safely
                setTimeout(() => {
                    UI.els.loading.style.opacity = '0';
                    setTimeout(() => {
                        UI.els.loading.style.display = 'none';
                        document.getElementById('app-container').style.display = 'flex';
                    }, 300);
                }, 500); // Slight delay ensures fonts and tailwind parsed

            } catch (error) {
                console.error("Initialization Failed:", error);
                document.getElementById('loading').innerHTML = `
                    <div class="text-red-500 font-bold mb-2 text-2xl">Initialization Error</div>
                    <div class="text-gray-600 dark:text-gray-300 text-sm max-w-md text-center">${error.message}</div>
                `;
            }
        });
    </script>
</body>
</html>
